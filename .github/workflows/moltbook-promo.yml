name: Moltbook Promo Posts

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/moltbook-promo.yml'
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      submolt:
        description: 'Submolt to post to'
        required: false
        default: 'm/general'

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select and post
        id: post
        env:
          API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          INPUT_SUBMOLT: ${{ github.event.inputs.submolt }}
        run: |
          TOTAL=$(jq length content/promo-posts.json)
          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)
          INDEX=$(( (DAY * 4 + HOUR / 6) % TOTAL ))

          TITLE=$(jq -r ".[$INDEX].title" content/promo-posts.json)
          BODY=$(jq -r ".[$INDEX].body" content/promo-posts.json)
          SUBMOLT=$(jq -r ".[$INDEX].submolt // \"general\"" content/promo-posts.json)

          if [ -n "$INPUT_SUBMOLT" ]; then
            SUBMOLT="$INPUT_SUBMOLT"
          fi

          FULL_BODY=$(printf "%s\n\nContact: khalid.khan46571@gmail.com" "$BODY")

          jq -n --arg title "$TITLE" --arg content "$FULL_BODY" --arg submolt "$SUBMOLT" \
            '{title: $title, content: $content, submolt: $submolt}' > /tmp/payload.json

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.moltbook.com/api/v1/posts" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "posted=true" >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
            echo "submolt=$SUBMOLT" >> "$GITHUB_OUTPUT"
            echo "SUCCESS: Posted '$TITLE' to $SUBMOLT"
          else
            echo "posted=false" >> "$GITHUB_OUTPUT"
            echo "FAILED: HTTP $HTTP_CODE"
            echo "$RESPONSE_BODY"
            if [ "$HTTP_CODE" = "429" ]; then
              echo "Rate limited - will retry next schedule"
            fi
          fi

      - name: Log result
        if: always()
        env:
          POST_TITLE: ${{ steps.post.outputs.title }}
          POST_SUBMOLT: ${{ steps.post.outputs.submolt }}
          POST_STATUS: ${{ steps.post.outputs.posted }}
        run: |
          echo "## Moltbook Post Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Title:** $POST_TITLE" >> $GITHUB_STEP_SUMMARY
          echo "- **Submolt:** $POST_SUBMOLT" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** $POST_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
