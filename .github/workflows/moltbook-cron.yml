name: Moltbook Cron Scheduler

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      create_issues:
        description: "Create GitHub Issues for scheduled posts"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  cron-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Calculate scheduled posts
        id: schedule
        run: |
          if [ ! -f "content/promo-posts.json" ]; then
            echo "promo-posts.json not found"
            echo "## No promo-posts.json found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Calculate dates for next 7 days
          TODAY=$(date -u +%Y-%m-%d)
          END_DATE=$(date -u -d "+7 days" +%Y-%m-%d)

          echo "TODAY=$TODAY" >> $GITHUB_OUTPUT
          echo "END_DATE=$END_DATE" >> $GITHUB_OUTPUT

          # Parse posts and filter by date range
          POSTS=$(cat content/promo-posts.json | jq -c --arg start "$TODAY" --arg end "$END_DATE" '
            [.[] | select(
              .scheduled_date >= $start and .scheduled_date <= $end
            ) | {day: .scheduled_date, title: .title, submolt: .submolt, status: .status}]')

          echo "posts<<EOF" >> $GITHUB_OUTPUT
          echo "$POSTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Count posts
          POST_COUNT=$(echo "$POSTS" | jq 'length')
          echo "count=$POST_COUNT" >> $GITHUB_OUTPUT

      - name: Create summary
        if: steps.schedule.outputs.count != '0'
        run: |
          POSTS='${{ steps.schedule.outputs.posts }}'

          echo "## Moltbook Posting Schedule" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Period:** ${{ steps.schedule.outputs.TODAY }} to ${{ steps.schedule.outputs.END_DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Posts scheduled:** ${{ steps.schedule.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Day | Title | Submolt | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          echo "$POSTS" | jq -r '.[] | "| \(.day) | \(.title) | \(.submolt) | \(.status) |"' >> $GITHUB_STEP_SUMMARY

      - name: Create summary (no posts)
        if: steps.schedule.outputs.count == '0' || steps.schedule.outputs.count == ''
        run: |
          echo "## Moltbook Posting Schedule" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No posts scheduled for the next 7 days." >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Issues
        if: steps.schedule.outputs.count != '0' && (github.event_name == 'workflow_dispatch' && inputs.create_issues == 'true' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTS: ${{ steps.schedule.outputs.posts }}
        run: |
          echo "$POSTS" | jq -c '.[]' | while read -r post; do
            TITLE=$(echo "$post" | jq -r '.title')
            DAY=$(echo "$post" | jq -r '.day')
            SUBMOLT=$(echo "$post" | jq -r '.submolt')
            STATUS=$(echo "$post" | jq -r '.status')

            # Check if issue already exists for this title
            EXISTING=$(gh issue list --label "scheduled-post" --json title --jq ".[] | select(.title == \"Scheduled: $TITLE\") | .title")

            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "Scheduled: $TITLE" \
                --label "scheduled-post" \
                --body "**Scheduled Date:** $DAY
          **Submolt:** r/$SUBMOLT
          **Status:** $STATUS

          This issue was auto-generated by the cron scheduler workflow."
              echo "Created issue for: $TITLE"
            else
              echo "Issue already exists for: $TITLE"
            fi
          done
