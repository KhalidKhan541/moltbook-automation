name: Moltbook Post Tracker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show posting schedule
        run: |
          TOTAL=$(jq length content/promo-posts.json)
          echo "## Moltbook Post Pool" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total posts available:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "**Posting frequency:** 4x daily (8 AM, 12 PM, 6 PM, 10 PM UTC)" >> $GITHUB_STEP_SUMMARY
          echo "**Posts per day:** 4" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Title | Submolt |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-------|---------|" >> $GITHUB_STEP_SUMMARY
          jq -r 'to_entries[] | "| \(.key + 1) | \(.value.title) | \(.value.submolt) |"' content/promo-posts.json >> $GITHUB_STEP_SUMMARY
