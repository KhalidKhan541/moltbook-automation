name: Moltbook Thread Posting

on:
  workflow_dispatch:
    inputs:
      thread_name:
        description: 'Thread name to post from content/threads.json'
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Post thread
        id: post
        env:
          API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          THREAD_NAME: ${{ github.event.inputs.thread_name }}
        run: |
          if [ ! -f content/threads.json ]; then
            echo "::error::content/threads.json not found"
            exit 1
          fi

          THREAD_JSON=$(jq -r --arg name "$THREAD_NAME" '.threads[$name]' content/threads.json)

          if [ "$THREAD_JSON" = "null" ]; then
            echo "::error::Thread '$THREAD_NAME' not found in threads.json"
            exit 1
          fi

          POST_COUNT=$(echo "$THREAD_JSON" | jq '.posts | length')
          PARENT_ID=""

          for i in $(seq 0 $((POST_COUNT - 1))); do
            CONTENT=$(echo "$THREAD_JSON" | jq -r ".posts[$i].content")

            if [ $i -eq 0 ]; then
              BODY=$(jq -n --arg content "$CONTENT" '{content: $content}')
            else
              BODY=$(jq -n --arg content "$CONTENT" --arg parent_id "$PARENT_ID" '{content: $content, parent_id: $parent_id}')
            fi

            echo "[$(date '+%H:%M:%S')] Posting message $((i + 1))/$POST_COUNT..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              https://www.moltbook.com/api/v1/posts \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d "$BODY")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESP_BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::error::Failed to post message $((i + 1)). HTTP $HTTP_CODE: $RESP_BODY"
              exit 1
            fi

            POST_ID=$(echo "$RESP_BODY" | jq -r '.post_id')
            echo "[$(date '+%H:%M:%S')] Message $((i + 1)) posted (post_id: $POST_ID)"

            if [ $i -eq 0 ]; then
              PARENT_ID="$POST_ID"
            fi

            if [ $i -lt $((POST_COUNT - 1)) ]; then
              sleep 2
            fi
          done

          echo "posted=true" >> "$GITHUB_OUTPUT"
          echo "count=$POST_COUNT" >> "$GITHUB_OUTPUT"

      - name: Log completion
        if: always()
        env:
          THREAD_NAME: ${{ github.event.inputs.thread_name }}
          POSTED: ${{ steps.post.outputs.posted }}
          COUNT: ${{ steps.post.outputs.count }}
        run: |
          echo "### Thread Post Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Thread:** $THREAD_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${POSTED:-failed}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Posts:** ${COUNT:-0}" >> "$GITHUB_STEP_SUMMARY"
